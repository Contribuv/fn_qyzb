    <div class="admin-sidebar-brand">
        <div class="admin-sidebar-title">
            <div class="title-main">管理后台</div>
            <div class="title-sub">{{if .appName}}{{.appName}}{{else}}千盈助播{{end}}</div>
        </div>
    </div>
    <nav class="admin-sidebar-nav">
        <a href="/admin" class="nav-item {{if eq .activeTab "dashboard"}}active{{end}}">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="9"/><rect x="14" y="3" width="7" height="5"/><rect x="14" y="12" width="7" height="9"/><rect x="3" y="16" width="7" height="5"/></svg>
            <span>信息面板</span>
        </a>
        <a href="/admin/users" class="nav-item {{if eq .activeTab "users"}}active{{end}}">

            <span>用户管理</span>
        </a>
        <a href="/admin/rooms" class="nav-item {{if eq .activeTab "rooms"}}active{{end}}">

        <a href="/admin/api" class="nav-item {{if eq .activeTab "api"}}active{{end}}">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg>
            <span>接口文档</span>
        </a>
    </nav>
    <div class="admin-sidebar-footer">
        <a href="/room" class="nav-item">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
            <span>返回前台</span>
        </a>
    </div>
</aside>
<div class="admin-sidebar-mask" id="sidebarMask" onclick="toggleSidebar()"></div>
<script>
function toggleSidebar() {
    var sb = document.getElementById('adminSidebar');
    var mk = document.getElementById('sidebarMask');
    sb.classList.toggle('open');
    mk.classList.toggle('show');
}
</script>
